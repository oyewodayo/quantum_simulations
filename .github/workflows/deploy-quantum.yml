name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: briefbrew
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          set -e
          
          # Deploy main app
          cd /var/www/briefbrew
          git fetch origin main
          git pull origin main
          composer install --no-dev --optimize-autoloader
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Deploy quantum simulator
          # Option 1: If your quantum simulator is in a subdirectory in the same repo
          # cd /var/www/briefbrew/public/quantum
          # git pull origin main
          
          # Option 2: If your quantum simulator is in a separate repo
          cd /var/www/quantum-simulator
          git pull origin main || git clone https://github.com/oyewodayo/quantum-simulator.git .
          
          # Build your quantum simulator (adjust based on your project)
          # npm install
          # npm run build
          
          # Reload nginx
          sudo systemctl reload nginx
          
          echo "Deployment completed successfully!"